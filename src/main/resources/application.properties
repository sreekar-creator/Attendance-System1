# Server configuration
server.port=${PORT:8080}

# Database connection configuration
# This setup automatically handles both Render PostgreSQL and MySQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:attendance_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:password}}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# Hibernate Dialect (Automatically detected, but helpful to force if metadata fails)
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

# JPA / Hibernate configuration
# Update the schema on start
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Static resources mapping (though Spring Boot does this by default for /static)
spring.mvc.static-path-pattern=/**
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
