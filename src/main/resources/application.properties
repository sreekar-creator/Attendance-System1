# Server configuration
server.port=${PORT:8080}

# Database connection configuration (Spring Boot will pick up DATABASE_URL automatically if present for Postgres)
# or you can set these variables in the cloud environment.
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:attendance_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root1}

# JPA / Hibernate configuration
# Update the schema on start
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Static resources mapping (though Spring Boot does this by default for /static)
spring.mvc.static-path-pattern=/**
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
