# Server configuration
server.port=8081

# MySQL Database connection configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/attendance_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root1}

# JPA / Hibernate configuration
# Update the schema on start
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Static resources mapping (though Spring Boot does this by default for /static)
spring.mvc.static-path-pattern=/**
